<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">
  <link rel="stylesheet" href="css/style.css">
  <title>Admin Dashboard · 19 Years, 19 Chapters</title>
</head>
<body data-page="admin">
  <div class="loader" aria-hidden="true"><div class="initials">V ❤️ S</div></div>
  <div class="bg-ornaments" aria-hidden="true"><span class="orb one"></span><span class="orb two"></span><span class="orb three"></span></div>
  <main class="shell chapter-layout">
    <nav class="glass topbar" aria-label="Admin navigation">
      <a class="btn secondary" href="index.html">Story Home</a>
      <a id="debugLink" class="btn secondary" href="debug-mobile.html" hidden>Mobile Debug</a>
      <button id="logoutBtn" class="btn secondary" type="button">Logout</button>
    </nav>
    <section class="glass chapter-card" aria-labelledby="admin-title">
      <p class="eyebrow">Protected admin route</p>
      <h1 id="admin-title" class="title">Admin Dashboard</h1>
      <p class="subtitle">Preview chapters, edit story content, manage unlock progress, and inspect the unlock schedule.</p>
      <div class="chapter-actions">
        <button id="resetProgress" class="btn secondary" type="button">Reset Progress</button>
        <button id="unlockAll" class="btn gold" type="button">Unlock All Chapters</button>
        <button id="lockAll" class="btn secondary" type="button">Lock All Chapters</button>
        <button id="previewFinal" class="btn secondary" type="button">Preview Final Unlock</button>
      </div>
      <div class="admin-grid">
        <aside class="panel glass">
          <h2>All Chapters</h2>
          <div id="adminList" class="list"></div>
        </aside>
        <section class="panel glass">
          <form id="chapterEditor"></form>
          <h2>Countdown Schedule</h2>
          <div id="schedule" class="small"></div>
        </section>
      </div>
    </section>
  </main>
  <script defer src="js/config.js"></script>
  <script defer src="js/security.js"></script>
  <script defer src="js/chapters.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/unlock-system.js"></script>
  <script defer src="js/main.js"></script>
</body>
</html>
