<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="referrer" content="no-referrer">
  <link rel="stylesheet" href="css/style.css">
  <title>Login · 19 Years, 19 Chapters</title>
</head>
<body data-page="login">
  <div class="loader" aria-hidden="true"><div class="initials">V ❤️ H</div></div>
  <div class="bg-ornaments" aria-hidden="true"><span class="orb one"></span><span class="orb two"></span><span class="orb three"></span></div>
  <div class="petals" aria-hidden="true"></div>
  <main class="center-wrap shell">
    <section class="glass login-card fade-up" aria-labelledby="login-title">
      <p class="eyebrow">Private birthday story</p>
      <h1 id="login-title">19 Years,<br>19 Chapters</h1>
      <p class="subtitle">A luxury interactive storybook, opened one memory at a time.</p>
      <form id="loginForm" novalidate>
        <label class="field"><span>Username</span><input name="username" autocomplete="username" required aria-required="true"></label>
        <label class="field"><span>Password</span><input name="password" type="password" autocomplete="current-password" required aria-required="true"></label>
        <label class="check"><input type="checkbox" name="remember"> Remember Me</label>
        <p id="loginError" class="error" role="alert" aria-live="polite"></p>
        <button class="btn gold" type="submit">Enter the Story</button>
      </form>
    </section>
  </main>
  <script defer src="js/config.js"></script>
  <script defer src="js/security.js"></script>
  <script defer src="js/chapters.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/unlock-system.js"></script>
  <script defer src="js/main.js"></script>
</body>
</html>
